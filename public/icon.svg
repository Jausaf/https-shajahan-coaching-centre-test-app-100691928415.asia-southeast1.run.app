<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Gradients -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="amber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#d97706" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  <rect width="500" height="500" x="6" y="6" rx="122" fill="none" stroke="#334155" stroke-width="4" />

  <!-- Ambient Glow -->
  <circle cx="256" cy="256" r="180" fill="url(#glow-grad)" />

  <!-- Icon Base Circle -->
  <circle cx="256" cy="256" r="120" fill="#1e293b" stroke="#475569" stroke-width="6" />

  <!-- Achievement Trophy & Book Design -->
  <g transform="translate(156, 156)">
    <!-- Book representation -->
    <path d="M 40 140 Q 100 130 100 150 Q 100 130 160 140 L 160 60 Q 100 50 100 70 Q 100 50 40 60 Z" fill="#334155" stroke="#475569" stroke-width="4" stroke-linejoin="round" />
    <path d="M 40 140 Q 100 130 100 150 L 100 70 Q 100 50 40 60 Z" fill="#1e293b" />
    
    <!-- Trophy Silhouette in gold gradient -->
    <path d="M 70 50 C 70 10 130 10 130 50 C 130 80 115 90 110 100 L 110 115 L 125 115 L 125 125 L 75 125 L 75 115 L 90 115 L 90 100 C 85 90 70 80 70 50 Z" fill="url(#amber-grad)" />
    <!-- Trophy Handles -->
    <path d="M 70 40 C 50 40 50 70 70 70 Z" fill="none" stroke="url(#amber-grad)" stroke-width="6" stroke-linecap="round" />
    <path d="M 130 40 C 150 40 150 70 130 70 Z" fill="none" stroke="url(#amber-grad)" stroke-width="6" stroke-linecap="round" />
    
    <!-- Star on Trophy -->
    <polygon points="100,42 103,50 112,50 105,55 107,63 100,58 93,63 95,55 88,50 97,50" fill="#ffffff" />
  </g>
</svg>
